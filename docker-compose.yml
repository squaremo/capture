services:
  backend:
    build: ./backend
    restart: unless-stopped
    env_file: /opt/capture/.env
    volumes:
      - /opt/capture/data:/data
    expose:
      - "3000"

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/tailscale/certs:/etc/nginx/certs:ro
    depends_on:
      - backend
