name: Deploy

on:
  workflow_run:
    workflows: [Build]
    types: [completed]
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      # The server is only reachable over Tailscale, so connect to the tailnet
      # before SSH-ing in. Requires an ephemeral auth key in secrets.
      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Resolve Tailscale IP
        id: ts
        run: |
          peer=$(echo "${{ secrets.DEPLOY_HOST }}" | cut -d. -f1)
          echo "ip=$(tailscale ip -4 "$peer")" >> "$GITHUB_OUTPUT"

      - name: Deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ steps.ts.outputs.ip }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd /opt/capture/app
            docker compose pull
            docker compose up -d
